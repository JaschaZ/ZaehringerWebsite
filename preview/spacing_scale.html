<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;align-items:center;gap:14px}
  .box{background:var(--oat);height:28px;border-radius:2px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg3);width:72px}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--fg1);width:64px}
</style></head><body><div class="wrap">
  <div class="row"><span class="tok">--s-1</span><span class="lbl">4px</span><div class="box" style="width:4px"></div></div>
  <div class="row"><span class="tok">--s-2</span><span class="lbl">8px</span><div class="box" style="width:8px"></div></div>
  <div class="row"><span class="tok">--s-3</span><span class="lbl">12px</span><div class="box" style="width:12px"></div></div>
  <div class="row"><span class="tok">--s-4</span><span class="lbl">16px</span><div class="box" style="width:16px"></div></div>
  <div class="row"><span class="tok">--s-5</span><span class="lbl">24px</span><div class="box" style="width:24px"></div></div>
  <div class="row"><span class="tok">--s-6</span><span class="lbl">32px</span><div class="box" style="width:32px"></div></div>
  <div class="row"><span class="tok">--s-7</span><span class="lbl">44px ◆</span><div class="box" style="width:44px"></div></div>
  <div class="row"><span class="tok">--s-8</span><span class="lbl">64px</span><div class="box" style="width:64px"></div></div>
  <div class="row"><span class="tok">--s-9</span><span class="lbl">96px</span><div class="box" style="width:96px"></div></div>
</div></body></html>
