<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:18px}
  img{display:block;height:24px}
  .row{display:flex;align-items:center;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .row:last-child{border:0}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto}
  .mono{width:40px;height:40px}
  .sig{height:36px}
</style></head><body><div class="wrap">
  <div class="row"><img src="../assets/wordmark.svg" alt="wordmark"><span class="lbl">wordmark · inter 300 · tracked 0.22em</span></div>
  <div class="row"><img class="mono" src="../assets/monogram.svg" alt="monogram"><span class="lbl">monogram · cormorant italic 500</span></div>
  <div class="row"><img class="sig" src="../assets/signature.svg" alt="signature"><span class="lbl">signature · cormorant italic 400</span></div>
</div></body></html>
