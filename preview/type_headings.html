<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:18px}
  .s{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border);padding-bottom:12px}
  .s .t{flex:1}
  .s .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg3);white-space:nowrap}
  .h1{font-family:var(--font-serif);font-style:italic;font-size:56px;line-height:1.08;letter-spacing:-0.01em;color:var(--ink);margin:0}
  .h2{font-family:var(--font-serif);font-style:italic;font-size:40px;line-height:1.15;color:var(--ink);margin:0}
  .h3{font-family:var(--font-sans);font-weight:400;font-size:28px;line-height:1.25;color:var(--ink);margin:0}
</style></head><body><div class="wrap">
  <div class="s"><div class="t"><p class="h1">A small page, held</p></div><div class="meta">h1 · serif italic · 56/1.08</div></div>
  <div class="s"><div class="t"><p class="h2">A small page, held</p></div><div class="meta">h2 · serif italic · 40/1.15</div></div>
  <div class="s" style="border-bottom:0"><div class="t"><p class="h3">A small page, held</p></div><div class="meta">h3 · inter 400 · 28/1.25</div></div>
</div></body></html>
