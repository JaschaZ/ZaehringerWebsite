<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:18px;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:12px}
  .row:last-child{border-bottom:0}
  .l{flex:1}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg3);white-space:nowrap}
  .eyebrow{font-family:var(--font-sans);font-weight:300;font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--sand)}
  .body{font-family:var(--font-sans);font-weight:300;font-size:17px;line-height:1.55;color:var(--bark);max-width:48ch;margin:0}
  .micro{font-family:var(--font-sans);font-weight:300;font-size:11px;letter-spacing:0.04em;color:var(--fg1)}
</style></head><body><div class="wrap">
  <div class="row"><div class="l"><span class="eyebrow">Get in touch</span></div><div class="meta">eyebrow · 10.5/0.22em</div></div>
  <div class="row"><div class="l"><p class="body">I build things. Sometimes they stay built. This is the quiet register — Inter 300 at 17px, a long leading, and a maximum measure of about 62 characters so nothing feels crowded.</p></div><div class="meta">body · inter 300 · 17/1.55</div></div>
  <div class="row"><div class="l"><span class="micro">jaschazaehringer@protonmail.com</span></div><div class="meta">micro · 11/0.04em</div></div>
</div></body></html>
