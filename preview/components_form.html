<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .field{display:flex;flex-direction:column;gap:8px}
  label{font-family:var(--font-sans);font-weight:300;font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--sand)}
  input,textarea{font-family:var(--font-sans);font-weight:300;font-size:15px;color:var(--ink);background:transparent;border:0;border-bottom:1px solid var(--border);padding:8px 0;outline:none;transition:border-color .25s cubic-bezier(.4,0,.2,1)}
  input:focus,textarea:focus{border-bottom-color:var(--ink)}
  textarea{resize:none;min-height:48px}
  input::placeholder,textarea::placeholder{color:var(--stone)}
</style></head><body><div class="wrap">
  <div class="field"><label>Name</label><input placeholder="Your name"></div>
  <div class="field"><label>Email</label><input value="jaschazaehringer@protonmail.com"></div>
  <div class="field"><label>Message</label><textarea placeholder="A few words, no more than needed."></textarea></div>
</div></body></html>
