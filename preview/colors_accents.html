<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px}
  .sw{flex:1;min-height:76px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border-radius:4px;font-family:var(--font-sans);font-weight:300;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#F5F0E8}
  .sw .h{font-size:10px;letter-spacing:0.04em;text-transform:none;font-family:var(--font-mono);opacity:.7;margin-top:2px}
  .note{font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--fg3);margin-top:4px}
</style></head><body><div class="wrap">
  <div class="row">
    <div class="sw" style="background:#C87B5A">Terracotta<span class="h">#C87B5A</span></div>
    <div class="sw" style="background:#C9A25E">Ochre<span class="h">#C9A25E</span></div>
    <div class="sw" style="background:#7F8A5C">Moss<span class="h">#7F8A5C</span></div>
    <div class="sw" style="background:#B58A7C">Rose<span class="h">#B58A7C</span></div>
  </div>
  <div class="note">Used once per screen, at most. Never loud.</div>
</div></body></html>
