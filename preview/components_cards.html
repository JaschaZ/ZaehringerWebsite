<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;gap:16px}
  .card{flex:1;background:var(--parchment);padding:28px 24px;border-radius:4px}
  .card.hair{background:transparent;border:1px solid var(--border)}
  .eyebrow{font-family:var(--font-sans);font-weight:300;font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--sand);margin-bottom:14px}
  .ttl{font-family:var(--font-serif);font-style:italic;font-size:26px;line-height:1.2;color:var(--ink);margin:0 0 10px}
  .body{font-family:var(--font-sans);font-weight:300;font-size:13px;line-height:1.55;color:var(--bark);margin:0}
</style></head><body><div class="wrap">
  <div class="card"><div class="eyebrow">Writing · 2026</div><p class="ttl">On holding a small page</p><p class="body">A short note on restraint — what stays when you remove everything that isn't essential.</p></div>
  <div class="card hair"><div class="eyebrow">Case study</div><p class="ttl">A single gesture, repeated</p><p class="body">A six-word interaction that carried an entire site.</p></div>
</div></body></html>
