<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px;align-items:stretch}
  .sw{flex:1;min-height:76px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border-radius:4px;font-family:var(--font-sans);font-weight:300;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase}
  .sw .h{font-size:10px;letter-spacing:0.04em;text-transform:none;font-family:var(--font-mono);opacity:.6;margin-top:2px}
  .dark{color:#F5F0E8}
  .light{color:#1A1A1A}
</style></head><body><div class="wrap">
  <div class="row">
    <div class="sw dark" style="background:#F5F0E8;color:#1A1A1A;border:1px solid var(--border)">Cream<span class="h">#F5F0E8</span></div>
    <div class="sw dark" style="background:#1A1A1A">Ink<span class="h">#1A1A1A</span></div>
    <div class="sw light" style="background:#FBF7F0;border:1px solid var(--border)">Parchment<span class="h">#FBF7F0</span></div>
    <div class="sw light" style="background:#EDE5D8">Linen<span class="h">#EDE5D8</span></div>
  </div>
</div></body></html>
