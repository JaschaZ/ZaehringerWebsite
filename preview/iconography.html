<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:14px}
  .r{display:flex;align-items:center;gap:16px}
  .g{font-family:var(--font-serif);font-style:italic;font-size:36px;color:var(--ink);width:48px;text-align:center}
  .d{font-family:var(--font-sans);font-weight:300;font-size:13px;color:var(--bark);flex:1}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
  .note{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--fg3);margin-top:6px;border-top:1px solid var(--border);padding-top:10px}
</style></head><body><div class="wrap">
  <div class="r"><span class="g">↗</span><span class="d">External link marker</span><span class="t">U+2197</span></div>
  <div class="r"><span class="g">·</span><span class="d">Inline separator</span><span class="t">U+00B7</span></div>
  <div class="r"><span class="g">—</span><span class="d">Soft parenthetical</span><span class="t">U+2014</span></div>
  <div class="r"><span class="g">§</span><span class="d">Section marker</span><span class="t">U+00A7</span></div>
  <div class="note">No emoji. No SVG illustrations. Lucide at stroke 1.25 if a line icon is truly required.</div>
</div></body></html>
