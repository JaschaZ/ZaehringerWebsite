<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px;height:260px;overflow:hidden;position:relative}
  #header{position:absolute;top:22px;left:32px}
  .name{font-family:var(--font-sans);font-size:10.5px;font-weight:300;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink)}
  .chain{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-serif);font-style:italic;font-size:34px;color:var(--ink);white-space:nowrap;letter-spacing:-0.01em;display:flex;gap:10px}
  .chain span{opacity:1}
  footer{position:absolute;bottom:0;left:0;right:0;border-top:1px solid var(--border);padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
  .lbl{font-family:var(--font-sans);font-size:9.5px;font-weight:300;letter-spacing:0.24em;text-transform:uppercase;color:var(--sand)}
  .lk{font-family:var(--font-sans);font-size:11px;font-weight:300;letter-spacing:0.04em;color:var(--ink);display:flex;gap:14px;align-items:center}
  .dot{color:var(--stone)}
  #cur{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--ink);top:52%;left:63%;mix-blend-mode:multiply}
</style></head><body>
<div id="header"><span class="name">Jascha Zähringer</span></div>
<div class="chain"><span>F</span><span style="opacity:.92">O</span><span style="opacity:.86">L</span><span style="opacity:.80">L</span><span style="opacity:.74">O</span><span style="opacity:.68">W</span><span style="opacity:.62">Y</span><span style="opacity:.56">O</span><span style="opacity:.50">U</span><span style="opacity:.44">R</span><span style="opacity:.38">D</span><span style="opacity:.32">R</span><span style="opacity:.27">E</span><span style="opacity:.25">A</span><span style="opacity:.25">M</span></div>
<div id="cur"></div>
<footer><span class="lbl">Get in touch</span><div class="lk"><span>jaschazaehringer@protonmail.com</span><span class="dot">·</span><span>Instagram ↗</span><span class="dot">·</span><span>LinkedIn ↗</span></div></footer>
</body></html>
