<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream);width:700px}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px}
  .sw{flex:1;min-height:76px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border-radius:4px;font-family:var(--font-sans);font-weight:300;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#1A1A1A}
  .sw .h{font-size:10px;letter-spacing:0.04em;text-transform:none;font-family:var(--font-mono);opacity:.6;margin-top:2px}
</style></head><body><div class="wrap">
  <div class="row">
    <div class="sw" style="background:#D9CEBC">Oat<span class="h">#D9CEBC</span></div>
    <div class="sw" style="background:#C7B8A3">Clay<span class="h">#C7B8A3</span></div>
    <div class="sw" style="background:#B0A090">Stone<span class="h">#B0A090</span></div>
    <div class="sw" style="background:#9C8E7E;color:#F5F0E8">Sand<span class="h">#9C8E7E</span></div>
    <div class="sw" style="background:#6B5F52;color:#F5F0E8">Bark<span class="h">#6B5F52</span></div>
  </div>
</div></body></html>
